bundle:
  name: lufthansa_bundle

include:
  - resources/*.yml
  - resources/jobs/*.yml
  - resources/pipelines/*.yml

variables:
  catalog:
    description: "Catalog for data assets"
    default: lufthansa_level
  schema:
    description: "Schema for data assets"
    default: default

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-5ac54e60-f19e.cloud.databricks.com
      root_path: ~/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: lufthansa_level
      schema: bronze
