endpoints:

    countries:
        path: "/references/countries"
        resource_key: "CountryResource"
        collection_path: ["CountryResource", "Countries", "Country"]
        total_count_path: ["CountryResource", "Meta", "TotalCount"]
        raw_folder: "countries"
        bronze_table: "countries_raw"
        silver_table: "countries"
        query_params: ["offset", "limit", "lang"]
        paginable: True
  
    cities:
        path: "/references/cities"
        resource_key: "CityResource"
        collection_path: ["CityResource", "Cities", "City"]
        total_count_path: ["CityResource", "Meta", "TotalCount"]
        raw_folder: "cities"
        bronze_table: "cities_raw"
        silver_table: "cities"    
        query_params: ["offset", "limit", "lang"]
        paginable: True

    airports:
        path: "/references/airports"
        resource_key: "AirportResource"
        collection_path: ["AirportResource", "Airports", "Airport"]
        total_count_path: ["AirportResource", "Meta", "TotalCount"]
        raw_folder: "airports"
        bronze_table: "airports_raw"
        silver_table: "airports"    
        query_params: ["offset", "limit", "lang"]
        paginable: True

    airlines:
        path: "/references/airlines"
        resource_key: "AirlineResource"
        collection_path: ["AirlineResource", "Airlines", "Airline"]
        total_count_path: ["AirlineResource", "Meta", "TotalCount"]
        raw_folder: "airlines"
        bronze_table: "airlines_raw"
        silver_table: "airlines"    
        query_params: ["offset", "limit", "lang"]
        paginable: True

    aircraft:
        path: "/references/aircraft"
        resource_key: "AircraftResource"
        collection_path: ["AircraftSummaries", "AircraftSummary"]
        total_count_path: ["AircraftResource", "Meta", "TotalCount"]
        raw_folder: "aircraft"
        bronze_table: "aircraft_raw"
        silver_table: "aircraft"    
        query_params: ["offset", "limit", "lang"]
        paginable: True

    flightstatus_by_route:
        path: "/operations/flightstatus/route/{origin}/{destination}/{fromDateTime}"
        resource_key: "FlightStatusResource"
        collection_path: ["FlightStatusResource", "Flights", "Flight"]
        total_count_path: ["FlightStatusResource", "Meta", "TotalCount"]
        raw_folder: "flightstatus_by_route"
        raw_folder_details: "origin={origin}/destination={destination}/"
        bronze_table: "flightstatus_by_route_raw"
        silver_table: "flightstatus_by_route"   
        path_params: ["origin", "destination", "fromDateTime"] 
        query_params: ["offset", "limit", "lang"]
        paginable: True
        # If true, a 404 indicates the whole endpoint/request should stop
        stop_on_404: True

    flight_schedules:
        path: "/flight-schedules/flightschedules/passenger"
        raw_folder: "flight_schedules"
        bronze_table: "flight_schedules_raw"
        silver_table: "flight_schedules"   
        query_params: ["airlines", "flightNumberRanges", "startDate", "endDate", "daysOfOperation", "timeMode"] 
        paginable: False
        validation_path: [0, "airline"]

    # /operations/schedules/{origin}/{destination}/{fromDateTime}[?directFlights=true]
    flight_schedules_by_route:
        path: "/operations/schedules/{origin}/{destination}/{fromDateTime}"
        resource_key: "ScheduleResource"
        collection_path: ["Schedule", "TotalJourney"]
        raw_folder: "flight_schedules_by_route"
        raw_folder_details: "origin={origin}/destination={destination}/"
        bronze_table: "flight_schedules_by_route_raw"
        silver_table: "flight_schedules_by_route"   
        path_params: ["origin", "destination", "fromDateTime"] 
        paginable: False
        # If true, a 404 indicates the whole endpoint/request should stop
        stop_on_404: True

    # /operations/flightstatus/departures/{airportCode}/{fromDateTime}?serviceType={serviceType}
    # limit=50 !!!!!!
    flightstatus_by_departure:
        path: "/operations/flightstatus/departures/{airportCode}/{fromDateTime}"
        resource_key: "FlightStatusResource"
        collection_path: ["FlightStatusResource", "Flights", "Flight"]
        total_count_path: ["FlightStatusResource", "Meta", "TotalCount"]
        raw_folder: "flightstatus_by_departure"
        raw_folder_details: "departure={airportCode}/"
        bronze_table: "flightstatus_by_departure_raw"
        silver_table: "flightstatus_by_departure"   
        path_params: ["airportCode", "fromDateTime"] 
        query_params: ["offset", "limit", "lang"]
        paginable: True
        limit_max: 50
        # If true, a 404 indicates the whole endpoint/request should stop
        stop_on_404: True
    
    # /operations/flightstatus/arrivals/{airportCode}/{fromDateTime}?serviceType={serviceType}
    # limit=50 !!!!!!
    flightstatus_by_arrival:
        path: "/operations/flightstatus/arrivals/{airportCode}/{fromDateTime}"
        resource_key: "FlightStatusResource"
        collection_path: ["FlightStatusResource", "Flights", "Flight"]
        total_count_path: ["FlightStatusResource", "Meta", "TotalCount"]
        raw_folder: "flightstatus_by_arrival"
        raw_folder_details: "arrival={airportCode}/"
        bronze_table: "flightstatus_by_arrival_raw"
        silver_table: "flightstatus_by_arrival"   
        path_params: ["airportCode", "fromDateTime"] 
        query_params: ["offset", "limit", "lang"]
        paginable: True
        limit_max: 50
        # If true, a 404 indicates the whole endpoint/request should stop
        stop_on_404: True
