resources:
  jobs:
    temp_gold:
      name: operations_gold
      tasks:
        - task_key: operations_gold_task
          spark_python_task:
            python_file: ${workspace.file_path}/src/3_gold/operations/operations_gold_job.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default
      queue:
        enabled: true
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
            # environment_variables:
            #   PYTHONPATH: "${workspace.file_path}"
      performance_target: PERFORMANCE_OPTIMIZED
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 5 * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"
