resources:
  jobs:
    lufthansa_daily_workflow:
      name: "Lufthansa daily operational Job"

      schedule:
        quartz_cron_expression: "0 6 * * * ?"
        timezone_id: Europe/Berlin
        pause_status: UNPAUSED

      tasks:
        # 1. FETCH OPERATIONS (API → landing_area)
        - task_key: fetch_operational_data
          spark_python_task:
            python_file: ${workspace.file_path}/src/1_bronze/daily_ingestion_job.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 60000

        # 2. Autoloader -> Bronze -> Silver -> Gold (Analytics)
        - task_key: build_gold_operational
          depends_on:
            - task_key: fetch_operational_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.operations_pipeline.id}
          timeout_seconds: 1800
          max_retries: 1 # 2
          min_retry_interval_millis: 60000

      queue:
        enabled: true

      environments:
        - environment_key: default
          spec:
            environment_version: "5"


      performance_target: PERFORMANCE_OPTIMIZED
      max_concurrent_runs: 1
