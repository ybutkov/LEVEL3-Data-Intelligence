resources:
  jobs:
    monthly_references_ingestion:
      name: "Lufthansa monthly reference Job"

      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: Europe/Berlin
        pause_status: UNPAUSED

      tasks:
        # 1. FETCH References (API → landing_area)
        - task_key: fetch_references_data
          spark_python_task:
            python_file: ${workspace.file_path}/src/1_bronze/monthly_references_ingeston.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 60000

        # 2. Autoloader -> Bronze -> Silver
        - task_key: build_silver_references
          depends_on:
            - task_key: fetch_references_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.references_pipeline.id}
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 60000

      queue:
        enabled: true

      environments:
        - environment_key: default
          spec:
            environment_version: "5"

      performance_target: PERFORMANCE_OPTIMIZED
      max_concurrent_runs: 1