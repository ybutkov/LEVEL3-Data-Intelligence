resources:
  jobs:
    lufthansa_init_setup:
      name: "Lufthansa Initialization"
      description: "One-time setup: catalog, schemas, reference dimensions"
      tasks:
        - task_key: setup_catalog
          spark_python_task:
            python_file: ${workspace.file_path}/src/0_init/setup_catalog.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default
          
        - task_key: load_references
          depends_on:
            - task_key: setup_catalog
          spark_python_task:
            python_file: ${workspace.file_path}/src/0_init/load_references.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default
      
      queue:
        enabled: true
      
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      
      max_concurrent_runs: 1
      timeout_seconds: 3600
