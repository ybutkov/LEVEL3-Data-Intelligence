resources:
  jobs:
    daily_operational_workflow:
      name: daily_operational_workflow

      schedule:
        quartz_cron_expression: "0 0 5 * * ?"
        timezone_id: Europe/Berlin
        pause_status: UNPAUSED

      tasks:
        # 1. FETCH (API → landing_area)
        - task_key: fetch_operational_data
          spark_python_task:
            python_file: ${workspace.file_path}/src/1_bronze/daily_fetch.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default

        # 2. BRONZE (Auto Loader pipeline)
        - task_key: load_to_bronze
          depends_on:
            - task_key: fetch_operational_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.ingestion_pipeline_autoload.id}

        # 3. SILVER (parse + validate + deduplicate)
        - task_key: build_silver_operational
          depends_on:
            - task_key: load_to_bronze
          spark_python_task:
            python_file: ${workspace.file_path}/src/2_silver/operations/operations_silver_job.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default

        # 4. GOLD (still empty)
        - task_key: build_gold_operational
          depends_on:
            - task_key: build_silver_operational
          spark_python_task:
            python_file: ${workspace.file_path}/src/3_gold/operations/operations_gold_job.py
            parameters:
              - --root_path
              - "${workspace.file_path}"
          environment_key: default

      queue:
        enabled: true

      environments:
        - environment_key: default
          spec:
            environment_version: "5"

      max_concurrent_runs: 1
